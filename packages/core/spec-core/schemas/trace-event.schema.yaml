$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://pairslash.dev/schemas/trace-event/1.0.0"
title: PairSlash Trace Event
type: object
required:
  - kind
  - schema_version
  - event_id
  - event_type
  - timestamp
  - session_id
  - workflow_id
  - correlation_id
  - runtime
  - target
  - severity
  - failure_domain
  - command_name
  - actor
  - source_package
  - source_module
  - outcome
  - payload
  - redaction_tags
  - telemetry_eligible
properties:
  kind:
    const: pairslash-trace-event
  schema_version:
    const: "1.0.0"
  event_id:
    type: string
  event_type:
    type: string
  timestamp:
    type: string
  session_id:
    type: string
  workflow_id:
    type: string
  correlation_id:
    type: string
  runtime:
    type:
      - string
      - "null"
  target:
    type:
      - string
      - "null"
  severity:
    type: string
  failure_domain:
    type: string
  command_name:
    type: string
  actor:
    type: string
  source_package:
    type: string
  source_module:
    type: string
  outcome:
    type: string
  payload:
    type: object
  redaction_tags:
    type: array
    items:
      type: string
  telemetry_eligible:
    type: boolean

