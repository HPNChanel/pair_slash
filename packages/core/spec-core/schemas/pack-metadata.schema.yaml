# PairSlash Pack Metadata Schema
# JSON Schema expressed as YAML.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://pairslash.dev/schemas/pack-metadata/0.2.0"
title: PairSlash Pack Metadata
description: >-
  Schema for formalized PairSlash pack metadata, including explicit model pins,
  memory authority, runtime targets, and output/failure contracts.

type: object
required:
  - kind
  - id
  - version
  - phase
  - status
  - category
  - workflow_class
  - codex
  - memory_access
  - required_inputs
  - output_contract
  - failure_contract
  - runtime_targets
  - compatibility_notes
  - source_of_truth

properties:
  kind:
    type: string
    const: pack-metadata
  id:
    type: string
    minLength: 1
  version:
    type: string
    minLength: 1
  phase:
    type: integer
    minimum: 0
  status:
    type: string
    enum:
      - active
      - deprecated
      - draft
  category:
    type: string
    minLength: 1
  workflow_class:
    type: string
    minLength: 1
  codex:
    type: object
    required:
      - plan_on_model
      - plan_off_model
    properties:
      plan_on_model:
        type: string
        minLength: 1
      plan_off_model:
        type: string
        minLength: 1
    additionalProperties: false
  memory_access:
    type: object
    required:
      - authority
      - global_project_memory
      - task_memory
      - session_context
      - audit_log
      - invariant
    properties:
      authority:
        type: string
        enum:
          - read-only
          - write-authority
      global_project_memory:
        type: string
        enum:
          - none
          - read
          - write
      task_memory:
        type: string
        enum:
          - none
          - read
          - write
      session_context:
        type: string
        enum:
          - none
          - read
          - implicit-read
      audit_log:
        type: string
        enum:
          - none
          - write
      invariant:
        type: string
        minLength: 1
    additionalProperties: false
  required_inputs:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - name
        - required
        - description
      properties:
        name:
          type: string
          minLength: 1
        required:
          type: boolean
        description:
          type: string
          minLength: 1
      additionalProperties: false
  output_contract:
    type: object
    required:
      - plan_mode
      - default_mode
    properties:
      plan_mode:
        $ref: "#/$defs/outputMode"
      default_mode:
        $ref: "#/$defs/outputMode"
    additionalProperties: false
  failure_contract:
    type: object
    required:
      - plan_mode
      - default_mode
    properties:
      plan_mode:
        $ref: "#/$defs/failureMode"
      default_mode:
        $ref: "#/$defs/failureMode"
    additionalProperties: false
  runtime_targets:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - runtime
        - canonical_entrypoint
        - direct_invocation
        - surfaces
      properties:
        runtime:
          type: string
          enum:
            - codex_cli
            - copilot_cli
        canonical_entrypoint:
          type: string
          const: /skills
        direct_invocation:
          type: string
          minLength: 1
        surfaces:
          type: array
          minItems: 1
          items:
            $ref: "#/$defs/runtimeSurface"
      additionalProperties: false
  compatibility_notes:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  source_of_truth:
    type: object
    required:
      - pack_dir
      - skill
      - contract
      - spec
      - validation_checklist
    properties:
      pack_dir:
        type: string
      skill:
        type: string
      contract:
        type: string
      spec:
        type: string
      validation_checklist:
        type: string
    additionalProperties: false

$defs:
  outputMode:
    type: object
    required:
      - format
      - sections
    properties:
      format:
        type: string
        minLength: 1
      sections:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
    additionalProperties: false
  failureMode:
    type: object
    required:
      - blockers
    properties:
      blockers:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
    additionalProperties: false
  runtimeSurface:
    type: object
    required:
      - id
      - invocation
      - status
      - evidence_refs
    properties:
      id:
        type: string
        minLength: 1
      invocation:
        type: string
        minLength: 1
      status:
        type: string
        enum:
          - supported
          - experimental
          - unverified
          - blocked
      evidence_refs:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
    additionalProperties: false

additionalProperties: false
