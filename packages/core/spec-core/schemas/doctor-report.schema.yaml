$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://pairslash.dev/schemas/doctor-report/2.1.0"
title: PairSlash Doctor Report
type: object
required:
  - kind
  - schema_version
  - generated_at
  - runtime
  - target
  - support_verdict
  - install_blocked
  - environment_summary
  - scope_probes
  - support_lane
  - runtime_compatibility
  - checks
  - issues
  - next_actions
  - remediation
  - installed_packs
  - first_workflow_guidance
properties:
  kind:
    const: doctor-report
  schema_version:
    const: "2.1.0"
  generated_at:
    type: string
  runtime:
    type: string
    enum:
      - codex_cli
      - copilot_cli
  target:
    type: string
    enum:
      - repo
      - user
  support_verdict:
    type: string
    enum:
      - pass
      - warn
      - degraded
      - fail
      - unsupported
  install_blocked:
    type: boolean
  environment_summary:
    type: object
    required:
      - os
      - shell
      - shell_profile_candidates
      - cwd
      - repo_root
      - config_home
      - install_root
      - state_path
      - runtime_executable
      - runtime_version
      - runtime_available
    properties:
      os:
        type: string
      shell:
        type: string
      shell_profile_candidates:
        type: array
        items:
          type: string
      cwd:
        type: string
      repo_root:
        type: string
      config_home:
        type: string
      install_root:
        type: string
      state_path:
        type: string
      runtime_executable:
        type:
          - string
          - "null"
      runtime_version:
        type:
          - string
          - "null"
      runtime_available:
        type: boolean
  scope_probes:
    type: object
    required:
      - repo
      - user
    properties:
      repo:
        $ref: "#/$defs/scopeProbe"
      user:
        $ref: "#/$defs/scopeProbe"
  support_lane:
    type: object
    required:
      - os
      - runtime
      - target
      - lane_status
      - tested_range_status
      - tested_version_range
      - evidence_source
      - blocking_for_install
      - summary
    properties:
      os:
        type: string
      runtime:
        type: string
        enum:
          - codex_cli
          - copilot_cli
      target:
        type: string
        enum:
          - repo
          - user
      lane_status:
        type: string
        enum:
          - supported
          - unverified
          - prep
          - unsupported
      tested_range_status:
        type: string
        enum:
          - recorded
          - unrecorded
          - outside_recorded
          - prep_lane
          - unsupported
      tested_version_range:
        type:
          - string
          - "null"
      evidence_source:
        type: string
      blocking_for_install:
        type: boolean
      summary:
        type: string
  runtime_compatibility:
    type: object
    required:
      - requested_runtime_range_max_status
      - selected_pack_count
      - compatible_pack_count
      - incompatible_pack_ids
    properties:
      requested_runtime_range_max_status:
        type: string
        enum:
          - supported
          - mismatch
          - unknown
      selected_pack_count:
        type: integer
      compatible_pack_count:
        type: integer
      incompatible_pack_ids:
        type: array
        items:
          type: string
  recent_trace_summary:
    type: object
    properties:
      telemetry_mode:
        type: string
      session_count:
        type: integer
      latest_session_id:
        type:
          - string
          - "null"
      latest_outcome:
        type:
          - string
          - "null"
      latest_failure_domain:
        type:
          - string
          - "null"
      retention_last_pruned_at:
        type:
          - string
          - "null"
  observability_health:
    type: object
    properties:
      trace_root_exists:
        type: boolean
      trace_root_writable:
        type: boolean
      index_event_consistent:
        type: boolean
      missing_event_files:
        type: integer
      retention_last_pruned_at:
        type:
          - string
          - "null"
      retention_policy:
        type: object
        properties:
          max_days:
            type: integer
          max_sessions:
            type: integer
          preserve_exports:
            type: boolean
          preserve_bundles:
            type: boolean
  reason_codes:
    type: array
    items:
      type: string
  remediation_actions:
    type: array
    items:
      $ref: "#/$defs/remediationAction"
  remediation:
    $ref: "#/$defs/remediationEnvelope"
  checks:
    type: array
    items:
      type: object
      required:
        - id
        - group
        - severity
        - status
        - runtime
        - target
        - inputs
        - summary
        - remediation
        - evidence
        - blocking_for_install
      properties:
        id:
          type: string
        group:
          type: string
          enum:
            - runtime
            - scope
            - filesystem
            - manifest
            - dependencies
            - install_state
            - conflict
            - platform
            - trust
        severity:
          type: string
          enum:
            - info
            - warn
            - fail
        status:
          type: string
          enum:
            - pass
            - warn
            - degraded
            - fail
            - unsupported
            - skip
        runtime:
          type: string
          enum:
            - codex_cli
            - copilot_cli
        target:
          type: string
          enum:
            - repo
            - user
        inputs:
          type: object
        summary:
          type: string
        remediation:
          type:
            - string
            - "null"
        evidence:
          type: object
        blocking_for_install:
          type: boolean
        reason_codes:
          type: array
          items:
            type: string
        remediation_actions:
          type: array
          items:
            $ref: "#/$defs/remediationAction"
  issues:
    type: array
    items:
      type: object
      required:
        - code
        - verdict
        - severity
        - check_id
        - summary
        - evidence
        - suggested_fix
        - blocking_for_install
      properties:
        code:
          type: string
        verdict:
          type: string
          enum:
            - warn
            - degraded
            - fail
            - unsupported
        severity:
          type: string
          enum:
            - warn
            - fail
        check_id:
          type: string
        summary:
          type: string
        evidence:
          type: object
        suggested_fix:
          type:
            - string
            - "null"
        blocking_for_install:
          type: boolean
        message:
          type:
            - string
            - "null"
        remediation:
          type:
            - string
            - "null"
        reason_codes:
          type: array
          items:
            type: string
        remediation_actions:
          type: array
          items:
            $ref: "#/$defs/remediationAction"
  next_actions:
    type: array
    items:
      type: string
  installed_packs:
    type: array
    items:
      type: object
      required:
        - id
        - version
        - install_dir
        - local_overrides
      properties:
        id:
          type: string
        version:
          type: string
        install_dir:
          type: string
        local_overrides:
          type: integer
        trust_tier:
          type: string
        signature_status:
          type: string
        support_level:
          type: string
        source_class:
          type: string
        verification_status:
          type: string
  first_workflow_guidance:
    type: object
    required:
      - ready
      - recommended_pack_id
      - rationale
      - commands
    properties:
      ready:
        type: boolean
      recommended_pack_id:
        type:
          - string
          - "null"
      rationale:
        type: string
      commands:
        type: array
        items:
          type: string
$defs:
  scopeProbe:
    type: object
    required:
      - target
      - selected
      - config_home
      - install_root
      - state_path
      - config_home_exists
      - install_root_exists
      - writable
      - verdict
      - blocking_for_install
      - issue_codes
    properties:
      target:
        type: string
        enum:
          - repo
          - user
      selected:
        type: boolean
      config_home:
        type: string
      install_root:
        type: string
      state_path:
        type: string
      config_home_exists:
        type: boolean
      install_root_exists:
        type: boolean
      writable:
        type: boolean
      verdict:
        type: string
        enum:
          - pass
          - warn
          - degraded
          - fail
          - unsupported
      blocking_for_install:
        type: boolean
      issue_codes:
        type: array
        items:
          type: string
  remediationAction:
    type: object
    required:
      - action_id
      - action_kind
      - summary
      - safe_without_write
      - requires_preview
      - applies_to_actions
      - reason_codes
      - preferred
    properties:
      action_id:
        type: string
      action_kind:
        type: string
      summary:
        type: string
      command:
        type:
          - string
          - "null"
      path:
        type:
          - string
          - "null"
      safe_without_write:
        type: boolean
      requires_preview:
        type: boolean
      applies_to_actions:
        type: array
        items:
          type: string
      reason_codes:
        type: array
        items:
          type: string
      preferred:
        type: boolean
  remediationDecision:
    type: string
    enum:
      - repair
      - adopt
      - reconcile
      - abort
  remediationCommand:
    type: object
    required:
      - action_id
      - summary
      - command
      - safe_without_write
      - requires_preview
      - applies_to_actions
      - reason_codes
      - preferred
      - decision
    properties:
      action_id:
        type: string
      summary:
        type: string
      command:
        type: string
      safe_without_write:
        type: boolean
      requires_preview:
        type: boolean
      applies_to_actions:
        type: array
        items:
          type: string
      reason_codes:
        type: array
        items:
          type: string
      preferred:
        type: boolean
      decision:
        $ref: "#/$defs/remediationDecision"
  remediationActionWithDecision:
    type: object
    required:
      - action_id
      - action_kind
      - summary
      - command
      - path
      - safe_without_write
      - requires_preview
      - applies_to_actions
      - reason_codes
      - preferred
      - decision
    properties:
      action_id:
        type: string
      action_kind:
        type: string
      summary:
        type: string
      command:
        type:
          - string
          - "null"
      path:
        type:
          - string
          - "null"
      safe_without_write:
        type: boolean
      requires_preview:
        type: boolean
      applies_to_actions:
        type: array
        items:
          type: string
      reason_codes:
        type: array
        items:
          type: string
      preferred:
        type: boolean
      decision:
        $ref: "#/$defs/remediationDecision"
  remediationEnvelope:
    type: object
    required:
      - status
      - commands
      - actions
    properties:
      status:
        type: string
        enum:
          - none
          - advisory
          - blocked
      commands:
        type: array
        items:
          $ref: "#/$defs/remediationCommand"
      actions:
        type: array
        items:
          $ref: "#/$defs/remediationActionWithDecision"
