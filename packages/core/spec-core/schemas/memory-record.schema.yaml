# PairSlash Memory Record Schema
# JSON Schema expressed as YAML.
# Defines the structure that pairslash-memory-write-global validates against.
# Source: CLAUDE.md sections 11.3 and 11.4.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://pairslash.dev/schemas/memory-record/0.1.0"
title: PairSlash Memory Record
description: >-
  Schema for a single authoritative record in Global Project Memory.
  Every mutable record written by pairslash-memory-write-global must conform
  to this schema. Legacy system records (`charter`, `stack-profile`) are
  governed separately by system-record.schema.yaml.

type: object
required:
  - kind
  - title
  - statement
  - evidence
  - scope
  - confidence
  - action
  - tags
  - source_refs
  - updated_by
  - timestamp

properties:
  kind:
    type: string
    description: The category of knowledge being recorded.
    enum:
      - decision
      - command
      - glossary
      - constraint
      - ownership
      - incident-lesson
      - pattern

  title:
    type: string
    description: Human-readable title uniquely identifying this record within its kind.
    minLength: 3
    maxLength: 200

  statement:
    type: string
    description: >-
      The durable fact, decision, or knowledge being recorded.
      Must be concrete and actionable, not vague or aspirational.
    minLength: 10

  evidence:
    type: string
    description: >-
      What supports this statement. May reference commits, PRs, incidents,
      documentation, test results, or observed behavior.
      Required for medium/high confidence records.
    minLength: 5

  scope:
    type: string
    description: What part of the project this record applies to.
    enum:
      - whole-project
      - subsystem
      - path-prefix

  scope_detail:
    type: string
    description: >-
      When scope is "subsystem" or "path-prefix", this field specifies which
      subsystem or path prefix. Optional when scope is "whole-project".

  confidence:
    type: string
    description: >-
      How confident the author is in this record. Global memory should generally
      only accept medium or high confidence with evidence.
    enum:
      - low
      - medium
      - high

  action:
    type: string
    description: What this write does relative to existing records.
    enum:
      - append
      - supersede
      - reject-candidate-if-conflict

  supersedes:
    type: string
    description: >-
      When action is "supersede", this field identifies the record being replaced.
      Format: "kind/title" of the superseded record.

  tags:
    type: array
    description: Freeform tags for categorization and search.
    items:
      type: string
    minItems: 0

  source_refs:
    type: array
    description: >-
      References to the sources that support this record.
      May include file paths, URLs, commit SHAs, PR numbers, or document sections.
      Medium/high confidence records SHOULD include at least one source_ref.
    items:
      type: string
    minItems: 0

  updated_by:
    type: string
    description: >-
      Who or what created this record. May be a person, a workflow name,
      or a session identifier.
    minLength: 1

  timestamp:
    type: string
    description: ISO 8601 timestamp of when this record was created or last modified.
    format: date-time

additionalProperties: false

allOf:
  - if:
      properties:
        scope:
          enum:
            - subsystem
            - path-prefix
    then:
      required:
        - scope_detail
  - if:
      properties:
        action:
          const: supersede
    then:
      required:
        - supersedes

# Validation rules not expressible in JSON Schema alone:
#
# 1. If confidence is "low", the record SHOULD NOT be written to
#    project-memory/ directly. It belongs in staging/ or task-memory/.
#
# 2. If action is "supersede", the "supersedes" field is REQUIRED
#    and must reference an existing record.
#
# 3. Duplicate detection: a record with the same kind + title as an
#    existing record triggers a conflict. The workflow must surface
#    this conflict before allowing the write.
#
# 4. Evidence must be non-trivial for medium/high confidence.
#    "Because I said so" is not valid evidence.
