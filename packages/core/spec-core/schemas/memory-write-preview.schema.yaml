$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://pairslash.dev/schemas/memory-write-preview/1.0.0"
title: PairSlash Memory Write Preview
description: Preview artifact for the Phase 5 authoritative memory pipeline.

type: object
required:
  - kind
  - schema_version
  - runtime
  - target
  - request
  - policy_verdict
  - preview_patch
  - pipeline_stages
  - related_records
  - duplicate_matches
  - conflict_matches
  - scope_warnings
  - record_disposition
  - staging_artifact
  - approval
  - ready_for_apply
  - requires_confirmation
  - warnings
  - errors

properties:
  kind:
    const: memory-write-preview
  schema_version:
    const: "1.0.0"
  runtime:
    enum: [codex_cli, copilot_cli]
  target:
    enum: [repo, user]
  request:
    type: object
  policy_verdict:
    type: object
  preview_patch:
    type: object
  pipeline_stages:
    type: array
  related_records:
    type: array
  duplicate_matches:
    type: array
  conflict_matches:
    type: array
  scope_warnings:
    type: array
  record_disposition:
    enum: [append, supersede, reject-candidate-if-conflict]
  staging_artifact:
    type: object
  approval:
    type: object
  ready_for_apply:
    type: boolean
  requires_confirmation:
    type: boolean
  warnings:
    type: array
  errors:
    type: array

additionalProperties: true
