$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://pairslash.dev/schemas/support-bundle/1.0.0"
title: PairSlash Support Bundle
type: object
required:
  - kind
  - schema_version
  - generated_at
  - bundle_id
  - output_dir
  - safe_to_share
  - trace_locator
  - runtime_descriptor
  - privacy_descriptor
  - trace_export
  - redaction_report
  - files
properties:
  kind:
    const: support-bundle
  schema_version:
    const: "1.0.0"
  generated_at:
    type: string
  bundle_id:
    type: string
  output_dir:
    type: string
  safe_to_share:
    type: boolean
  trace_locator:
    type: object
    required:
      - session_id
      - command_name
      - decisive_failure_domain
    properties:
      session_id:
        type: string
      workflow_id:
        type:
          - string
          - "null"
      command_name:
        type: string
      decisive_failure_domain:
        type: string
      decisive_reason:
        type:
          - string
          - "null"
  runtime_descriptor:
    type: object
    required:
      - runtime
      - target
      - os
      - shell
      - runtime_version
    properties:
      runtime:
        type:
          - string
          - "null"
      target:
        type:
          - string
          - "null"
      os:
        type: string
      shell:
        type: string
      runtime_version:
        type:
          - string
          - "null"
  privacy_descriptor:
    type: object
    required:
      - redaction_state
      - consent_required
      - local_only_by_default
      - remote_collection_default
    properties:
      redaction_state:
        type: string
      consent_required:
        type: boolean
      local_only_by_default:
        type: boolean
      remote_collection_default:
        type: string
  failure_taxonomy:
    type: object
    required:
      - taxonomy_version
      - decisive_failure_domain
      - recommended_surface_label
      - recommended_type_label
      - recommended_severity_label
      - recommended_status_label
      - recommended_issue_template
      - maintainer_route
      - rationale
    properties:
      taxonomy_version:
        type: string
      decisive_failure_domain:
        type: string
      recommended_surface_label:
        type: string
      recommended_type_label:
        type: string
      recommended_severity_label:
        type: string
      recommended_status_label:
        type: string
      recommended_issue_template:
        type: string
      maintainer_route:
        type: string
      rationale:
        type: string
  trace_export:
    type: object
    properties:
      path:
        type: string
      session_count:
        type: integer
      event_count:
        type: integer
  redaction_report:
    type: object
    required:
      - redacted_fields
      - redacted_events
      - unknown_sensitive_hits
      - rules_triggered
      - redaction_state
      - secrets_removed
      - hashed_values
      - config_fingerprints
      - normalized_paths
    properties:
      redacted_fields:
        type: integer
      redacted_events:
        type: integer
      unknown_sensitive_hits:
        type: integer
      rules_triggered:
        type: array
        items:
          type: string
      redaction_state:
        type: string
      secrets_removed:
        type: integer
      hashed_values:
        type: integer
      config_fingerprints:
        type: integer
      normalized_paths:
        type: integer
  share_safety_reasons:
    type: array
    items:
      type: string
  debug_report_path:
    type:
      - string
      - "null"
  doctor_report_path:
    type:
      - string
      - "null"
  context_explanation_path:
    type:
      - string
      - "null"
  policy_explanation_path:
    type:
      - string
      - "null"
  issue_template_path:
    type:
      - string
      - "null"
  privacy_note_path:
    type:
      - string
      - "null"
  reproducibility_template_path:
    type:
      - string
      - "null"
  triage_template_path:
    type:
      - string
      - "null"
  readme_path:
    type:
      - string
      - "null"
  failure_taxonomy_path:
    type:
      - string
      - "null"
  files:
    type: array
    items:
      type: object
