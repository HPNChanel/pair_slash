# pairslash-plan Workflow Specification
# Phase 2 behavior with Phase 3 formalized pack metadata.
# Source: CLAUDE.md sections 9.1, 10, 12.1, 15

workflow:
  name: pairslash-plan
  version: "0.2.0"
  class: read-oriented
  phase: 2

  purpose: >-
    Create a structured execution plan before code changes.
    Incorporate stable project conventions from Global Project Memory.
    Separate facts from assumptions.
    Include tests and rollback thinking.

  canonical_invocation:
    primary: /skills -> select pairslash-plan
    codex_direct: $pairslash-plan
    copilot_direct: /pairslash-plan
    compatibility_source: docs/compatibility/runtime-surface-matrix.yaml

contracts:

  input:
    required:
      - name: goal
        type: string
        description: >-
          What the user wants to accomplish. May be a natural language
          description of a task, feature, migration, fix, or investigation.
    optional:
      - name: scope_hint
        type: string
        description: >-
          Hint about which part of the project this plan targets.
          Values: whole-project, subsystem name, or file path prefix.
      - name: constraints
        type: string
        description: >-
          Any explicit constraints the user wants the plan to respect
          beyond what Global Project Memory already declares.
    scope_assumption: >-
      If no scope_hint is provided, the workflow reads all project-memory
      files and infers scope from the goal description.

  output:
    format: structured-markdown
    deterministic_structure: true
    sections:
      - name: Goal
        description: Restated goal from user input.
      - name: Constraints
        description: >-
          Constraints drawn from Global Project Memory (50-constraints.yaml)
          plus any user-supplied constraints.
      - name: Relevant project memory
        description: >-
          Excerpts from .pairslash/project-memory/ that are relevant to this plan.
          Must cite the source file for each excerpt.
      - name: Proposed steps
        description: >-
          Numbered sequence of concrete implementation steps.
          Each step should be actionable and verifiable.
      - name: Files likely affected
        description: List of files or directories the plan expects to touch.
      - name: Tests and checks
        description: >-
          What tests should be written or run to verify the plan succeeded.
          Includes existing tests that might break.
      - name: Risks
        description: >-
          What could go wrong. Each risk should state likelihood and impact.
      - name: Rollback
        description: How to undo the plan if it fails or produces unexpected results.
      - name: Open questions
        description: >-
          Anything the plan cannot resolve without more information.
          Must distinguish "I don't know" from "I assumed X."

  failure:
    on_missing_memory: >-
      If .pairslash/project-memory/ does not exist or is empty, the workflow
      must warn the user and proceed with a plan that notes "no project memory
      available -- plan is based solely on user input and repo inspection."
    on_incomplete_goal: >-
      If the goal is too vague to produce actionable steps, the workflow must
      ask clarifying questions instead of generating a speculative plan.
    on_runtime_error: >-
      If file reading fails, the workflow must state which files it could not
      read and continue with available information, clearly marking gaps.

  memory:
    reads:
      - layer: global-project-memory
        paths:
          - .pairslash/project-memory/00-project-charter.yaml
          - .pairslash/project-memory/10-stack-profile.yaml
          - .pairslash/project-memory/50-constraints.yaml
          - .pairslash/project-memory/90-memory-index.yaml
        purpose: >-
          Load project identity, stack conventions, constraints, and the memory
          index to incorporate authoritative project context into the plan.
      - layer: task-memory
        paths:
          - .pairslash/task-memory/
        purpose: >-
          Optionally read task-memory for relevant ongoing initiative context.
    writes: none
    audit: none
    invariant: >-
      This workflow MUST NOT write to any memory layer.
      It MUST NOT propose memory writes as a side effect.
      If the plan reveals knowledge worth persisting, it should recommend
      the user invoke pairslash-memory-write-global separately.

  side_effect:
    filesystem_writes: none
    git_mutation: none
    network_calls: none

  packaging:
    metadata: packs/core/pairslash-plan/pack.yaml
    registry_entry: packages/core/spec-core/registry/packs.yaml
    compatibility_rules:
      - /skills remains the canonical invocation path.
      - Direct invocation claims must not exceed statuses recorded in the runtime matrix.
      - Pack identity/version must stay aligned across spec, contract, registry, and pack metadata.
