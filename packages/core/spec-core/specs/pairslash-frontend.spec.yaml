# pairslash-frontend Workflow Specification
# Phase 3 team-pack dual-mode frontend workflow.

workflow:
  name: pairslash-frontend
  version: "0.2.0"
  class: dual-mode
  phase: 3

  purpose: >-
    Produce frontend plans with product and accessibility discipline in Plan
    Mode, then implement polished UI changes in Default mode without writing
    Global Project Memory.

  canonical_invocation:
    primary: /skills -> select pairslash-frontend
    codex_direct: $pairslash-frontend
    copilot_direct: /pairslash-frontend

contracts:
  input:
    required:
      - name: task
        type: string
        description: Frontend UI, route, or component task to plan or implement.
    optional:
      - name: acceptance_criteria
        type: string
        description: Product, accessibility, or responsiveness constraints supplied by the user.
      - name: affected_paths
        type: string
        description: Routes, components, or styling areas expected to change.

  output:
    modes:
      plan_mode:
        format: structured-markdown
        deterministic_structure: true
        sections:
          - name: Objective
          - name: Relevant Memory Constraints
          - name: UX / Product Interpretation
          - name: Affected Components and Routes
          - name: Step-by-Step Plan
          - name: Validation Plan
          - name: Risks and Fallbacks
          - name: Proposed File Touch List
          - name: MEMORY_CANDIDATE
      default_mode:
        format: structured-markdown
        deterministic_structure: true
        sections:
          - name: Done
          - name: Files Changed
          - name: UX / Behavior Notes
          - name: Validation Run / Validation Needed
          - name: Remaining Risks
          - name: MEMORY_CANDIDATE

  failure:
    plan_mode:
      blockers:
        - Surface conflicts with existing UI conventions instead of inventing a new design language.
        - Make backend contract assumptions explicit when the frontend change depends on undefined responses.
    default_mode:
      blockers:
        - Stop and state missing product rules, design tokens, or backend response contracts instead of faking them.
        - Do not claim screenshots, measurements, or visual proof that were not observed.

  memory:
    reads:
      - layer: global-project-memory
        paths:
          - .pairslash/project-memory/
      - layer: task-memory
        paths:
          - .pairslash/task-memory/
    writes: none
    invariant: Frontend pack must not write Global Project Memory.

  side_effect:
    filesystem_writes: repo-local changes allowed in default_mode only
    git_mutation: possible-uncommitted-changes-only
    network_calls: none
