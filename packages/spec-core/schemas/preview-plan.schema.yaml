$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://pairslash.dev/schemas/preview-plan/1.0.0"
title: PairSlash Preview Plan
type: object
required:
  - kind
  - schema_version
  - action
  - runtime
  - target
  - install_root
  - state_path
  - can_apply
  - requires_confirmation
  - selected_packs
  - summary
  - warnings
  - errors
  - operations
properties:
  kind:
    const: preview-plan
  schema_version:
    const: "1.0.0"
  action:
    type: string
    enum:
      - install
      - update
      - uninstall
  runtime:
    type: string
    enum:
      - codex_cli
      - copilot_cli
  target:
    type: string
    enum:
      - repo
      - user
  install_root:
    type: string
  state_path:
    type: string
  can_apply:
    type: boolean
  requires_confirmation:
    type: boolean
  selected_packs:
    type: array
    items:
      type: string
  plan_path:
    type: string
  summary:
    type: object
  warnings:
    type: array
    items:
      type: string
  errors:
    type: array
    items:
      type: string
  operations:
    type: array
    items:
      type: object
      required:
        - kind
        - pack_id
        - absolute_path
        - reason
      properties:
        kind:
          type: string
        pack_id:
          type: string
        relative_path:
          type: string
        absolute_path:
          type: string
        asset_kind:
          type: string
        install_surface:
          type: string
        ownership:
          type: string
        override_eligible:
          type: boolean
        reason:
          type: string
