$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://pairslash.dev/schemas/normalized-ir/1.0.0"
title: PairSlash Normalized IR
type: object
required:
  - kind
  - schema_version
  - compiler_version
  - manifest_digest
  - pack
  - policy
  - runtime_support
  - logical_assets
properties:
  kind:
    const: normalized-pack-ir
  schema_version:
    const: "1.0.0"
  compiler_version:
    type: string
  manifest_digest:
    type: string
  logical_assets:
    type: array
    minItems: 1
