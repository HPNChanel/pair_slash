$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://pairslash.dev/schemas/contract-envelope/2.0.0"
title: PairSlash Workflow Contract Envelope
description: Machine-readable contract used by lint, preview, policy-engine, and runtime adapters.

type: object
required:
  - kind
  - schema_version
  - contract_id
  - source
  - runtime
  - target
  - canonical_entrypoint
  - workflow_class
  - risk_level
  - input_contract
  - output_contract
  - failure_contract
  - memory_contract
  - tool_contract
  - capability_scope
  - runtime_boundary

properties:
  kind:
    const: contract-envelope
  schema_version:
    const: "2.0.0"
  contract_id:
    type: string
    minLength: 1
  source:
    type: object
    required: [type, pack_id]
    properties:
      type:
        enum: [manifest, workflow, api, lint, preview]
      pack_id:
        type: [string, "null"]
      manifest_path:
        type: [string, "null"]
    additionalProperties: false
  runtime:
    enum: [codex_cli, copilot_cli]
  target:
    enum: [repo, user]
  canonical_entrypoint:
    const: /skills
  direct_invocation:
    type: [string, "null"]
  workflow_class:
    enum: [read-oriented, dual-mode, write-authority]
  risk_level:
    enum: [low, medium, high, critical]
  input_contract:
    type: object
    required:
      - required_fields
      - optional_fields
      - accepted_sources
      - accepted_modes
      - validation_hints
    properties:
      required_fields:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
        uniqueItems: true
      optional_fields:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
      accepted_sources:
        type: array
        minItems: 1
        items:
          enum: [cli, workflow, api]
        uniqueItems: true
      accepted_modes:
        type: array
        minItems: 1
        items:
          enum: [read, preview, apply, lint, doctor]
        uniqueItems: true
      validation_hints:
        type: object
        required:
          - schema_refs
          - strict_required_fields
          - reject_unknown_fields
          - error_codes
        properties:
          schema_refs:
            type: array
            minItems: 1
            items:
              type: string
              minLength: 1
            uniqueItems: true
          strict_required_fields:
            type: boolean
          reject_unknown_fields:
            type: boolean
          error_codes:
            type: array
            minItems: 1
            items:
              type: string
              minLength: 1
            uniqueItems: true
        additionalProperties: false
      schema_refs:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
    additionalProperties: false
  output_contract:
    type: object
    required:
      - output_shape
      - structured_sections
      - machine_readable_fields
      - artifacts
      - allowed_side_effects_summary
    properties:
      output_shape:
        enum: [structured-markdown, structured-json, structured-yaml]
      structured_sections:
        type: array
        minItems: 1
        items:
          type: object
          required: [id, label, required, machine_readable]
          properties:
            id:
              type: string
              minLength: 1
            label:
              type: string
              minLength: 1
            required:
              type: boolean
            machine_readable:
              type: boolean
          additionalProperties: false
      machine_readable_fields:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
      artifacts:
        type: array
        items:
          type: object
          required: [id, when]
          properties:
            id:
              type: string
              minLength: 1
            when:
              type: string
              minLength: 1
            required:
              type: boolean
          additionalProperties: false
      allowed_side_effects_summary:
        type: object
        required:
          - memory
          - network_allowed
          - destructive_allowed
          - secret_touching_allowed
          - preview_required
          - explicit_approval_required
          - filesystem_write_paths
        properties:
          memory:
            enum: [none, read, write, promote]
          network_allowed:
            type: boolean
          destructive_allowed:
            type: boolean
          secret_touching_allowed:
            type: boolean
          preview_required:
            type: boolean
          explicit_approval_required:
            type: boolean
          filesystem_write_paths:
            type: array
            items:
              type: string
              minLength: 1
            uniqueItems: true
        additionalProperties: false
    additionalProperties: false
  failure_contract:
    type: object
    required: [no_silent_fallback, categories, codes]
    properties:
      no_silent_fallback:
        type: boolean
      categories:
        type: array
        minItems: 1
        items:
          type: object
          required: [code, type, retryable, description]
          properties:
            code:
              type: string
              minLength: 1
            type:
              enum:
                - validation-failure
                - capability-mismatch
                - runtime-unsupported
                - policy-blocked
                - tool-unavailable
            retryable:
              type: boolean
            description:
              type: string
              minLength: 1
          additionalProperties: false
      codes:
        type: array
        minItems: 1
        items:
          type: string
          minLength: 1
        uniqueItems: true
    additionalProperties: false
  memory_contract:
    type: object
    required:
      - mode
      - target_scope
      - authoritative_write_allowed
      - preview_required
      - authority_mode
      - explicit_write_only
      - global_project_memory
      - task_memory
      - session_artifacts
      - audit_log
      - no_hidden_write
      - read_paths
      - write_paths
      - promote_paths
    properties:
      mode:
        enum: [none, read, write, promote]
      target_scope:
        enum: [global-project-memory, task-memory, staging, none]
      authoritative_write_allowed:
        type: boolean
      preview_required:
        type: boolean
      authority_mode:
        enum: [read-only, write-authority]
      explicit_write_only:
        type: boolean
      global_project_memory:
        enum: [none, read, write]
      task_memory:
        enum: [none, read, write]
      session_artifacts:
        enum: [none, implicit-read, read, write]
      audit_log:
        enum: [none, append]
      no_hidden_write:
        type: boolean
      read_paths:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
      write_paths:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
      promote_paths:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
    additionalProperties: false
  tool_contract:
    type: object
    required:
      - tools_allowed
      - tools_required
      - required_tools
      - required_mcp_servers
      - network_allowance
      - destructive_allowance
      - secret_touching_allowance
    properties:
      tools_allowed:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
      tools_required:
        type: array
        items:
          type: object
          required: [id, kind, check_command]
          properties:
            id:
              type: string
              minLength: 1
            kind:
              enum: [binary, script, env_var]
            check_command:
              type: string
              minLength: 1
            required_for:
              type: array
              items:
                enum: [compile, install, run, doctor]
              uniqueItems: true
          additionalProperties: false
      required_tools:
        type: array
        items:
          type: object
          required: [id, kind, check_command]
          properties:
            id:
              type: string
              minLength: 1
            kind:
              enum: [binary, script, env_var]
            check_command:
              type: string
              minLength: 1
            required_for:
              type: array
              items:
                enum: [compile, install, run, doctor]
              uniqueItems: true
          additionalProperties: false
      required_mcp_servers:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
      network_allowance:
        type: boolean
      destructive_allowance:
        type: boolean
      secret_touching_allowance:
        type: boolean
    additionalProperties: false
  capability_scope:
    type: object
    required:
      - runtime_scope
      - requested
      - granted
      - negotiation
      - degraded_behavior_notes
    properties:
      runtime_scope:
        enum: [codex-only, copilot-only, both]
      requested:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
      granted:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
      negotiation:
        type: array
        items:
          type: object
          required: [capability, status]
          properties:
            capability:
              type: string
              minLength: 1
            status:
              enum: [granted, ask, denied, fallback-blocked]
            reason:
              type: [string, "null"]
          additionalProperties: false
      degraded_behavior_notes:
        type: array
        items:
          type: string
          minLength: 1
        uniqueItems: true
    additionalProperties: false
  runtime_boundary:
    type: object
    required: [adapter, enforcement_mode, differences]
    properties:
      adapter:
        enum: [codex_cli, copilot_cli]
      enforcement_mode:
        type: string
        minLength: 1
      differences:
        type: array
        items:
          type: string
          minLength: 1
    additionalProperties: false

additionalProperties: false
