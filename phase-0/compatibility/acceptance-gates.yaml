# PairSlash Phase 0 Acceptance Gates
# Binary pass/fail criteria. Phase 0 is not complete until all MUST gates pass.

gates_version: "0.1.0"
last_updated: "2026-03-21"
structural_verification_date: "2026-03-21"
structural_verification_note: >-
  Gates G8, G9, G10, G15, G16, G17, G18 verified structurally from Cursor.
  Gates G1-G7, G11-G14 require live CLI testing on Codex CLI or Copilot CLI.
  All 9 YAML files parse cleanly. Both SKILL.md files have valid frontmatter.

must_gates:
  description: >-
    Blocking gates. ALL must pass for Phase 0 to be considered complete.

  gates:
    - id: G1
      title: "pairslash-plan installable and visible"
      description: >-
        pairslash-plan SKILL.md can be installed and appears in /skills listing
        on at least one runtime.
      test_method: >-
        1. Copy phase-0/skills/pairslash-plan/ to runtime skill directory
        2. Launch CLI
        3. Use /skills or equivalent to list skills
        4. Verify pairslash-plan appears
      status: untested
      evidence: null

    - id: G2
      title: "pairslash-memory-write-global installable and visible"
      description: >-
        pairslash-memory-write-global SKILL.md can be installed and appears
        in /skills listing on at least one runtime.
      test_method: >-
        1. Copy phase-0/skills/pairslash-memory-write-global/ to runtime skill directory
        2. Launch CLI
        3. Use /skills or equivalent to list skills
        4. Verify pairslash-memory-write-global appears
      status: untested
      evidence: null

    - id: G3
      title: "pairslash-plan reads project memory"
      description: >-
        pairslash-plan, when invoked, reads at least one file from
        .pairslash/project-memory/ and incorporates it into its output.
      test_method: >-
        1. Ensure .pairslash/project-memory/ contains at least 00-project-charter.yaml
        2. Invoke pairslash-plan with a goal
        3. Check output for references to project charter content
      pass_criteria: >-
        Output contains at least one citation or excerpt from a project memory file.
      status: untested
      evidence: null

    - id: G4
      title: "pairslash-plan output follows declared structure"
      description: >-
        pairslash-plan output contains all 9 required sections: Goal, Constraints,
        Relevant project memory, Proposed steps, Files likely affected,
        Tests and checks, Risks, Rollback, Open questions.
      test_method: >-
        1. Invoke pairslash-plan with a concrete goal
        2. Verify all 9 section headers appear in output
      pass_criteria: All 9 sections present, in order, with content or "None identified."
      status: untested
      evidence: null

    - id: G5
      title: "Write workflow produces preview patch before writing"
      description: >-
        pairslash-memory-write-global, when invoked, produces a YAML preview
        patch before writing any file.
      test_method: >-
        1. Invoke pairslash-memory-write-global with valid structured input
        2. Verify a preview patch is displayed
        3. Verify no files in .pairslash/ are modified before user acceptance
      pass_criteria: Preview patch displayed; no file writes before user says "yes."
      status: untested
      evidence: null

    - id: G6
      title: "Write workflow requires explicit acceptance"
      description: >-
        pairslash-memory-write-global does not write to .pairslash/project-memory/
        without explicit user confirmation.
      test_method: >-
        1. Invoke the skill with valid input
        2. When preview patch appears, say "no"
        3. Verify no file was written to project-memory/
        4. Check audit-log/ for a rejection entry
      pass_criteria: >-
        Saying "no" stops the write. No new files in project-memory/.
        Rejection logged in audit-log/ (SHOULD, not MUST for this gate).
      status: untested
      evidence: null

    - id: G7
      title: "Written record contains all 11 semantic fields"
      description: >-
        A memory record written by pairslash-memory-write-global contains
        all 11 minimum semantic fields from CLAUDE.md Section 11.3:
        kind, title, statement, evidence, scope, confidence, action,
        tags, source_refs, updated_by, timestamp.
      test_method: >-
        1. Complete a successful write flow (accept the preview)
        2. Read the written YAML file
        3. Verify all 11 fields are present and non-empty
      pass_criteria: All 11 fields present with valid values.
      status: untested
      evidence: null

    - id: G8
      title: ".pairslash/ directory structure matches canonical shape"
      description: >-
        The .pairslash/ directory structure matches CLAUDE.md Section 8.
        Directories may be empty but must exist.
      test_method: >-
        Verify these paths exist:
        .pairslash/project-memory/
        .pairslash/task-memory/
        .pairslash/sessions/
        .pairslash/audit-log/
        .pairslash/staging/
      pass_criteria: All 5 directories exist.
      status: pass
      evidence: >-
        Verified via filesystem listing 2026-03-21. All 5 directories exist
        with .gitkeep files. project-memory/ contains 00-project-charter.yaml,
        10-stack-profile.yaml, and 90-memory-index.yaml.

    - id: G9
      title: "Runtime surface matrix documents all verification items"
      description: >-
        runtime-surface-matrix.yaml documents at least the 7 verification items
        (V1-V7) with status of tested, documented-only, or unverified.
      test_method: >-
        Read runtime-surface-matrix.yaml and verify V1-V7 are present
        with status fields.
      pass_criteria: All 7 items present with explicit status.
      status: pass
      evidence: >-
        Verified via grep 2026-03-21. V1-V7 all present in
        runtime-surface-matrix.yaml at lines 179-222. Each has status
        (unverified), question, method, and fallback fields.

    - id: G10
      title: "No silent memory writes in any SKILL.md"
      description: >-
        No SKILL.md contains instructions that silently write to Global
        Project Memory without preview and acceptance.
      test_method: >-
        1. Read pairslash-plan SKILL.md -- verify it has "MUST NOT write" invariant
        2. Read pairslash-memory-write-global SKILL.md -- verify preview + acceptance
           are mandatory steps that cannot be skipped
      pass_criteria: >-
        pairslash-plan explicitly prohibits writes.
        pairslash-memory-write-global requires preview + acceptance.
      status: pass
      evidence: >-
        Verified via grep 2026-03-21.
        pairslash-plan SKILL.md line 14: "This is a read-oriented workflow. You MUST NOT write to Global Project Memory."
        pairslash-plan SKILL.md line 94: "Never write to Global Project Memory. This workflow is read-only."
        pairslash-memory-write-global SKILL.md line 21: "NEVER write to .pairslash/project-memory/ without showing a preview patch first."
        pairslash-memory-write-global SKILL.md line 22: "NEVER write without explicit user acceptance."
        Step 7 (generate-preview-patch) and Step 8 (require-acceptance) are mandatory and sequential.

should_gates:
  description: >-
    Expected but non-blocking. Failure is documented but does not prevent
    Phase 0 completion.

  gates:
    - id: G11
      title: "Both skills work on both runtimes"
      description: Both skills work on Codex CLI AND Copilot CLI.
      status: untested
      evidence: null

    - id: G12
      title: "Write workflow detects duplicates"
      description: >-
        pairslash-memory-write-global detects a duplicate when a record
        with the same kind + title already exists.
      status: untested
      evidence: null

    - id: G13
      title: "Write workflow creates audit log entry"
      description: >-
        pairslash-memory-write-global appends an entry to .pairslash/audit-log/.
      status: untested
      evidence: null

    - id: G14
      title: "Direct invocation works"
      description: >-
        $pairslash-plan works on Codex, /pairslash-plan works on Copilot.
      status: untested
      evidence: null

will_not_gates:
  description: >-
    Scope containment gates. If ANY of these fail, the implementation has
    scope-crept beyond Phase 0 boundaries.

  gates:
    - id: G15
      title: "No third runtime references"
      description: No skill references a third runtime beyond Codex CLI and Copilot CLI.
      test_method: Search all SKILL.md files for references to Claude Code, Cursor, or other runtimes.
      status: pass
      evidence: >-
        Grep for "third runtime|claude.code|claude-code|cursor runtime|background daemon"
        across phase-0/skills/ returned zero matches (2026-03-21).

    - id: G16
      title: "No MCP, vector DB, or background daemons"
      description: No skill uses MCP, vector databases, or background daemons.
      test_method: Search all SKILL.md files for MCP, vector, daemon, or background references.
      status: pass
      evidence: >-
        Grep for "MCP|vector.database|background daemon" across phase-0/skills/
        returned zero matches (2026-03-21).

    - id: G17
      title: "No read-workflow memory mutation"
      description: No skill mutates Global Memory as a side effect of a read operation.
      test_method: Verify pairslash-plan has explicit write prohibition.
      status: pass
      evidence: >-
        pairslash-plan SKILL.md contains explicit prohibition at line 14
        ("MUST NOT write") and line 94 ("Never write to Global Project Memory.
        This workflow is read-only.").

    - id: G18
      title: "No out-of-scope memory authority"
      description: No file outside .pairslash/ is treated as authoritative project memory.
      test_method: Search all specs and skills for memory path references.
      status: pass
      evidence: >-
        All memory path references in both SKILL.md files point exclusively
        to .pairslash/ subdirectories. No external paths treated as
        authoritative memory. Verified via grep 2026-03-21.
