kind: pack-manifest-v2
schema_version: "2.1.0"
pack_name: pairslash-plan
display_name: PairSlash Plan
pack_version: "0.2.0"
summary: Create a structured execution plan before code changes.
category: planning
workflow_class: read-oriented
phase: 2
status: active
canonical_entrypoint: /skills
release_channel: preview
supported_runtimes:
  - codex_cli
  - copilot_cli
supported_runtime_ranges:
  codex_cli: ">=0.116.0"
  copilot_cli: ">=0.0.0"
runtime_bindings:
  codex_cli:
    direct_invocation: $pairslash-plan
    metadata_mode: openai_yaml_optional
    install_dir_name: pairslash-plan
    compatibility:
      canonical_picker: supported
      direct_invocation: supported
  copilot_cli:
    direct_invocation: /pairslash-plan
    metadata_mode: none
    install_dir_name: pairslash-plan
    compatibility:
      canonical_picker: supported
      direct_invocation: unverified
install_targets:
  - repo
  - user
capabilities:
  - plan_generation
  - repo_read
  - memory_read
risk_level: low
required_tools: []
required_mcp_servers: []
memory_permissions:
  authority_mode: read-only
  explicit_write_only: true
  global_project_memory: read
  task_memory: read
  session_artifacts: implicit-read
  audit_log: none
runtime_assets:
  source_root: packs/core/pairslash-plan
  primary_skill: SKILL.md
  entries:
    - asset_id: codex-config
      runtime: codex_cli
      asset_kind: config_fragment
      install_surface: config
      source_path: null
      generated_path: fragments/config/pack-config.yaml
      generator: codex_config
      required: true
      override_eligible: false
    - asset_id: codex-context
      runtime: codex_cli
      asset_kind: context_fragment
      install_surface: context
      source_path: null
      generated_path: fragments/context/runtime-context.md
      generator: codex_context
      required: true
      override_eligible: false
    - asset_id: codex-metadata
      runtime: codex_cli
      asset_kind: runtime_manifest
      install_surface: metadata
      source_path: null
      generated_path: agents/openai.yaml
      generator: codex_metadata
      required: true
      override_eligible: false
    - asset_id: contract-doc
      runtime: shared
      asset_kind: support_doc
      install_surface: support_doc
      source_path: contract.md
      generated_path: null
      generator: source_copy
      required: true
      override_eligible: true
    - asset_id: copilot-agent-context
      runtime: copilot_cli
      asset_kind: agent_fragment
      install_surface: agent
      source_path: null
      generated_path: agents/runtime-context.md
      generator: copilot_agent
      required: true
      override_eligible: false
    - asset_id: copilot-package
      runtime: copilot_cli
      asset_kind: runtime_manifest
      install_surface: metadata
      source_path: null
      generated_path: package/pairslash-bundle.json
      generator: copilot_package
      required: true
      override_eligible: false
    - asset_id: example-invocation-doc
      runtime: shared
      asset_kind: support_doc
      install_surface: support_doc
      source_path: example-invocation.md
      generated_path: null
      generator: source_copy
      required: true
      override_eligible: true
    - asset_id: example-output-doc
      runtime: shared
      asset_kind: support_doc
      install_surface: support_doc
      source_path: example-output.md
      generated_path: null
      generator: source_copy
      required: true
      override_eligible: true
    - asset_id: ownership-receipt
      runtime: shared
      asset_kind: ownership_manifest
      install_surface: metadata
      source_path: null
      generated_path: pairslash.install.json
      generator: pairslash_ownership_receipt
      required: true
      override_eligible: false
    - asset_id: pack-yaml-doc
      runtime: shared
      asset_kind: support_doc
      install_surface: support_doc
      source_path: pack.yaml
      generated_path: null
      generator: source_copy
      required: true
      override_eligible: true
    - asset_id: skill
      runtime: shared
      asset_kind: skill_markdown
      install_surface: canonical_skill
      source_path: SKILL.md
      generated_path: null
      generator: source_copy
      required: true
      override_eligible: true
    - asset_id: validation-checklist-doc
      runtime: shared
      asset_kind: support_doc
      install_surface: support_doc
      source_path: validation-checklist.md
      generated_path: null
      generator: source_copy
      required: true
      override_eligible: true
asset_ownership:
  ownership_file: pairslash.install.json
  ownership_scope: pack_root
  safe_delete_policy: pairslash-owned-only
  records:
    - asset_id: codex-config
      owner: pairslash
      uninstall_behavior: detach_if_modified
    - asset_id: codex-context
      owner: pairslash
      uninstall_behavior: detach_if_modified
    - asset_id: codex-metadata
      owner: pairslash
      uninstall_behavior: detach_if_modified
    - asset_id: contract-doc
      owner: pairslash
      uninstall_behavior: detach_if_modified
    - asset_id: copilot-agent-context
      owner: pairslash
      uninstall_behavior: detach_if_modified
    - asset_id: copilot-package
      owner: pairslash
      uninstall_behavior: detach_if_modified
    - asset_id: example-invocation-doc
      owner: pairslash
      uninstall_behavior: detach_if_modified
    - asset_id: example-output-doc
      owner: pairslash
      uninstall_behavior: detach_if_modified
    - asset_id: ownership-receipt
      owner: pairslash
      uninstall_behavior: remove_if_unmodified
    - asset_id: pack-yaml-doc
      owner: pairslash
      uninstall_behavior: detach_if_modified
    - asset_id: skill
      owner: pairslash
      uninstall_behavior: detach_if_modified
    - asset_id: validation-checklist-doc
      owner: pairslash
      uninstall_behavior: detach_if_modified
local_override_policy:
  marker_file: .pairslash.local-overrides.yaml
  marker_mode: state_or_explicit_marker
  eligible_asset_ids:
    - contract-doc
    - example-invocation-doc
    - example-output-doc
    - pack-yaml-doc
    - skill
    - validation-checklist-doc
update_strategy:
  mode: preserve_valid_local_overrides
  on_non_override_change: block
  rollback_strategy: restore_last_managed_state
uninstall_strategy:
  mode: pairslash_owned_only
  detach_modified_files: true
  preserve_unknown_files: true
  remove_empty_pack_dir: true
smoke_checks:
  - id: codex-repo-preview-install
    runtime: codex_cli
    target: repo
    action: preview_install
  - id: codex-repo-doctor
    runtime: codex_cli
    target: repo
    action: doctor
  - id: copilot-user-preview-install
    runtime: copilot_cli
    target: user
    action: preview_install
  - id: copilot-user-doctor
    runtime: copilot_cli
    target: user
    action: doctor
docs_refs:
  contract: contract.md
  example_invocation: example-invocation.md
  example_output: example-output.md
  validation_checklist: validation-checklist.md
trust_descriptor: pack.trust.yaml
