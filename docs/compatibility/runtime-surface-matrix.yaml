evidence_policy:
  canonical_entrypoint: /skills
  core_runtimes:
    - codex_cli
    - copilot_cli
  evidence_classes:
    deterministic_test: Regression confidence only. Never enough for public runtime promotion.
    fake_acceptance: Regression confidence only. Never enough for public runtime promotion.
    live_smoke: Real-host observation that can document feasibility or failure, but cannot by itself promote a lane beyond degraded or prep.
    live_verification: Minimum live evidence for a public lane claim on the exact runtime, target, OS, and canonical /skills path.
    repeated_live_verification: Minimum live evidence for stable-tested claims on the exact lane.
    shim_acceptance: Regression confidence only. Never enough for public runtime promotion.
  freshness:
    live_smoke:
      expire_after_days: 14
      stale_after_days: 7
    live_verification:
      expire_after_days: 60
      stale_after_days: 30
    repeated_live_verification:
      minimum_distinct_host_profiles: 2
      minimum_distinct_run_dates: 2
      newest_run_max_age_days: 30
      supporting_run_max_age_days: 60
  negative_failure_types:
    - runtime_unavailable
    - gh_unavailable
    - canonical_picker_missing
    - pack_not_visible
    - preview_fail
    - install_fail
    - workflow_fail
    - direct_invocation_fail
    - outside_recorded_range
  promotion_rules:
    blocked:
      requires_negative_live_evidence: true
    degraded:
      minimum_evidence_class: live_smoke
      requires_documented_caveat: true
    prep:
      minimum_evidence_class: live_verification
      promotion_blocked_without_live: true
    preview:
      minimum_evidence_class: live_verification
      minimum_host_profiles: 1
      requires_canonical_entrypoint: true
    stable_tested:
      minimum_evidence_class: repeated_live_verification
      minimum_host_profiles: 2
      requires_canonical_entrypoint: true
  registry_schema_ref: docs/evidence/live-runtime/schema.live-runtime-lane-record.yaml
  runbook_policy:
    command_capture_requirements:
      required_artifacts:
        - doctor_report
        - preview_plan_or_transcript
        - install_apply_transcript
        - canonical_picker_capture
        - workflow_transcript
        - registry_sidecar_update
    host_profile_required_fields:
      - host_profile_id
      - os
      - shell
      - runtime_executable
      - runtime_version
      - target
      - config_home
      - install_root
    live_verification_boundary:
      repeated_live_verification_requires:
        - distinct_host_profiles
        - distinct_run_dates
        - freshness_within_policy
      required_for_public_lane_claim:
        - real_host_runtime
        - managed_install_apply
        - canonical_picker_capture
        - pairslash_plan_via_skills
        - pairslash_memory_write_global_preview_gate
        - registry_write_back
    manual_vs_scripted_boundary:
      forbidden_substitutions:
        - compat_lab_as_live_proof
        - fake_runtime_as_live_proof
        - shim_acceptance_as_live_proof
        - codex_exec_as_canonical_picker_proof
      manual_steps_required:
        - canonical_skills_listing
        - workflow_selection_from_skills
        - workflow_prompt_and_response_capture
        - memory_write_preview_observation
      scripted_steps_allowed:
        - host_profile_capture
        - runtime_version_capture
        - doctor
        - preview_install
        - install_apply
    runtime_runbooks:
      codex_cli:
        default_target: repo
        direct_invocation:
          codex_exec_max_evidence_class: live_smoke
          promotion_requires_canonical_picker: true
          public_claim: documented-supplement-only
        minimum_capabilities_for_preview_lane:
          - runtime_available
          - install_apply
          - canonical_picker
          - workflow_execution
          - memory_write_preview_gate
        required_commands:
          - npm run pairslash -- doctor --runtime codex --target repo --format json
          - npm run pairslash -- preview install pairslash-plan --runtime codex --target repo --format json
          - npm run pairslash -- install pairslash-plan --runtime codex --target repo --apply --yes
        required_tool_presence:
          - codex
      copilot_cli:
        default_target: user
        direct_invocation:
          promotion_requires_canonical_picker: true
          public_claim: blocked
        minimum_capabilities_for_preview_lane:
          - gh_availability
          - runtime_available
          - install_apply
          - canonical_picker
          - workflow_execution
          - memory_write_preview_gate
        required_commands:
          - gh --version
          - gh copilot --help
          - npm run pairslash -- doctor --runtime copilot --target user --format json
          - npm run pairslash -- preview install pairslash-plan --runtime copilot --target user --format json
          - npm run pairslash -- install pairslash-plan --runtime copilot --target user --apply --yes
        required_tool_presence:
          - gh
          - gh_copilot_extension
    smoke_boundary:
      counts_as:
        - runtime_version_capture
        - doctor
        - preview_install
        - blocked_install
        - blocked_runtime_probe
        - partial_direct_invocation
      never_sufficient_for:
        - preview_lane_promotion
        - stable_tested_promotion
        - windows_promotion
        - canonical_picker_claim
    windows_promotion_gate:
      doctor_and_preview_never_enough: true
      requires:
        - install_apply
        - canonical_picker
        - workflow_execution
