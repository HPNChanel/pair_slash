support_policy:
  blocked: Fresh negative live evidence blocks the exact lane or documented surface until superseded by newer live verification.
  degraded: Real runtime evidence exists, but the canonical /skills path is missing, partial, or caveated for the documented lane.
  prep: Deterministic coverage and optional live smoke may exist, but canonical /skills verification is not yet recorded for the documented lane.
  preview: One fresh canonical live verification exists for the exact lane, but repeated live verification is not recorded yet.
  stable_tested: Repeated fresh canonical live verification exists for the exact runtime, target, OS, and lane scope.
version: 0.4.0
