support_policy:
  degraded: Deterministic compat-lab gates are green, but support is reduced by missing or partial live evidence or by documented caveats.
  known_broken: PairSlash has an explicit known issue or blocked surface. No silent fallback is allowed.
  prep: Doctor and preview are expected to work, but install claims are not yet recorded as live evidence.
  stable_tested: Deterministic compat-lab gates are green and a matching live runtime lane has recorded evidence.
version: 0.4.0
