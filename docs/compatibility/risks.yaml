version: "0.2.0"
phase: 2
last_updated: "2026-03-22"

risks:
  - id: R1
    title: Runtime install copies drift from source packs
    severity: medium
    status: active
    mitigation:
      - Treat packs/core as source-of-truth.
      - Reinstall skills after pack changes.
      - Keep validation on source paths.

  - id: R2
    title: Write-global contract may be bypassed by ad-hoc edits
    severity: high
    status: active
    mitigation:
      - Enforce checks in scripts/phase2_checks.py.
      - Require preview + acceptance language in skill/spec lint checks.
      - Audit memory changes in git review.

  - id: R3
    title: Legacy system records drift from mutable schema assumptions
    severity: medium
    status: mitigated
    mitigation:
      - Validate charter/stack-profile via system-record schema.
      - Mark record family in memory index.
      - Preserve schema_version=pre-0.1.0 on legacy system entries only.
