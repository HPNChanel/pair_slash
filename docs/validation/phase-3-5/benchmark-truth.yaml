  headline_wedges:
    - W1
    - W2a
    - W2b
    - W3
  headline_reporting_guard:
    W3: conditional_shadow_until_clean
  lane_policy:
    primary_scored_lane:
      lane_id: codex-cli-repo-macos
      classification: partially_evidenced
    shadow_only_lanes:
      - copilot-cli-user-linux
      - codex-cli-repo-windows
      - copilot-cli-user-windows
