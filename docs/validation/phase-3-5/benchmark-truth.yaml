unresolved_dependencies:
  - dependency_id: missing_post_11_roadmap
    status: docs_only
    claim_policy: do_not_infer
    effect_on_phase_19: benchmark implementation must inherit only from surviving truth roots
  - dependency_id: missing_phase_16_artifact
    status: docs_only
    claim_policy: do_not_infer
    effect_on_phase_19: any claimed Phase 16 reuse must come from surfaced outputs, not assumed lineage
  - dependency_id: missing_phase_19_artifact
    status: docs_only
    claim_policy: current_file_is_local_truth_root
    effect_on_phase_19: this benchmark truth package becomes the local Phase 19 reference until superseded
  - dependency_id: missing_phase_20_artifact
    status: docs_only
    claim_policy: do_not_infer
    effect_on_phase_19: no forward-looking readiness claims may inherit from an absent phase artifact
  - dependency_id: missing_model_routing_spec
    status: docs_only
    claim_policy: routing_agnostic_execution
    effect_on_phase_19: benchmark runs record model provenance only and never claim routing advantage
round_one_policy:
