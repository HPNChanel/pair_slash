    workflow_shape: "single-pack"
    underlying_packs:
      - "pairslash-plan"
    status: "deferred-supporting"
    raw_scores:
      pain_severity: 3
      recurrence: 4
      trust_gain: 3
      measurable_roi: 3
      repeated_weekly_use_potential: 4
      trust_layer_fit: 3
      adjacency_to_phase_4_5: 4
      implementation_realism: 5
    weighted_score: 69
    why_deferred: "Useful supporting workflow with high readiness, but too generic to lead the wedge strategy."
