    underlying_packs:
      - "pairslash-command-suggest"
    status: "deferred"
    raw_scores:
      pain_severity: 2
      recurrence: 4
      trust_gain: 2
      measurable_roi: 3
      repeated_weekly_use_potential: 3
      trust_layer_fit: 2
      adjacency_to_phase_4_5: 2
