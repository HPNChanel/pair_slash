excluded_candidates:
  - id: pairslash-backend
    reason: "Too broad for wedge proof and all documented runtime surfaces are unverified."
    evidence_refs:
      - "docs/compatibility/compatibility-matrix.md"
      - "packs/core/pairslash-backend/contract.md"
  - id: pairslash-frontend
    reason: "Too broad for wedge proof and all documented runtime surfaces are unverified."
    evidence_refs:
      - "docs/compatibility/compatibility-matrix.md"
      - "packs/core/pairslash-frontend/contract.md"
  - id: pairslash-devops
    reason: "Too environment-sensitive and enterprise-adjacent before local wedge validation."
    evidence_refs:
      - "docs/compatibility/compatibility-matrix.md"
      - "packs/core/pairslash-devops/contract.md"
  - id: pairslash-release
    reason: "Too release-operator oriented and too far from the first recurring trust wedge."
    evidence_refs:
      - "docs/compatibility/compatibility-matrix.md"
      - "packs/core/pairslash-release/contract.md"

decision:
  final_wedges:
    - sequence_rank: 1
      id: onboard-repo
    - sequence_rank: 2
      id: memory-candidate-to-memory-write-global
    - sequence_rank: 3
      id: review-fix-loop
  why_this_set_is_strongest: "It balances acquisition, moat, and repeated day-to-day utility without drifting into fake breadth."
  invalidate_if:
    - "onboard-repo does not beat manual cold start on speed or correctness"
    - "memory preview and acceptance are seen as ceremony without trust upside"
    - "review-fix loop shows stronger repeat intent than a selected wedge while preserving trust-layer differentiation"
    - "a deferred workflow records at least two stronger weekly-return signals than the weakest selected wedge"
    - "a chosen wedge requires unsupported runtime or enterprise breadth claims to look compelling"
