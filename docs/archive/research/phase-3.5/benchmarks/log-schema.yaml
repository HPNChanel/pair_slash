version: "0.1.0"
schema_id: "pairslash-phase-3.5-benchmark-log-schema"
record_type: "benchmark_run"

required_fields:
  - run_id
  - session_id
  - participant_id
  - icp_segment
  - runtime
  - runtime_version
  - arm
  - task_id
  - task_priority
  - wedge
  - prompt_variant_id
  - model_used
  - plan_mode_on
  - start_ts
  - first_success_ts
  - end_ts
  - elapsed_seconds
  - time_to_first_success_seconds
  - manual_rescue_count
  - reprompt_count
  - outcome_tag
  - observer_notes

fields:
  run_id:
    type: string
    example: "RUN-20260324-001"

  session_id:
    type: string
    example: "SES-20260324-A"

  participant_id:
    type: string
    example: "P-007"

  icp_segment:
    type: enum
    allowed_values:
      - p1_power_user_terminal
      - p1_tech_lead_maintainer_staff
      - p2_platform_devex_internal_tooling
      - p3_oss_maintainer_consultant

  runtime:
    type: enum
    allowed_values:
      - codex_cli
      - github_copilot_cli

  runtime_version:
    type: string
    example: "codex-cli/0.117.0"

  arm:
    type: enum
    allowed_values:
      - raw_cli
      - pairslash

  task_id:
    type: string
    example: "BM-MEM-02"

  task_priority:
    type: enum
    allowed_values:
      - must_win
      - should_win
      - supporting

  wedge:
    type: enum
    allowed_values:
      - onboard_repo
      - review_fix_loop
      - memory_candidate_write_global
      - ops_install_doctor
      - continuity_resume

  scenario:
    type: string
    required: false

  trigger:
    type: string
    required: false

  repo_id:
    type: string
    required: false

  repo_snapshot_ref:
    type: string
    required: false
    example: "commit:9f2a3b4"

  prompt_variant_id:
    type: string
    example: "PV-MEM-02-A"

  model_used:
    type: string
    example: "gpt-5.4"

  plan_mode_on:
    type: boolean

  start_ts:
    type: datetime_iso8601

  first_success_ts:
    type: datetime_iso8601

  end_ts:
    type: datetime_iso8601

  elapsed_seconds:
    type: integer
    min: 0

  time_to_first_success_seconds:
    type: integer
    min: 0

  manual_rescue_count:
    type: integer
    min: 0

  rescue_types:
    type: list
    required: false
    allowed_values:
      - tool_limit
      - prompt_clarity
      - runtime_env_issue
      - participant_error
      - unknown

  reprompt_count:
    type: integer
    min: 0

  rework_events_count:
    type: integer
    required: false
    min: 0

  rework_minutes:
    type: integer
    required: false
    min: 0

  install_doctor_success:
    type: boolean
    required: false

  issue_reproducibility_success:
    type: boolean
    required: false

  outcome_tag:
    type: enum
    allowed_values:
      - success_without_rescue
      - success_with_rescue
      - partial
      - failed
      - invalid_run

  task_success_without_manual_rescue:
    type: boolean
    required: false

  weekly_reusability_score:
    type: integer
    required: false
    allowed_values:
      - 0
      - 1
      - 2
      - 3

  participant_weekly_reuse_reason:
    type: string
    required: false

  observer_notes:
    type: string

  participant_quote:
    type: string
    required: false

  failure_mode_tags:
    type: list
    required: false
    item_type: string

  transcript_path:
    type: string
    required: false

  terminal_recording_path:
    type: string
    required: false

  log_artifact_path:
    type: string
    required: false

derived_metrics:
  - ttfs_score
  - rescue_score
  - reprompt_score
  - weekly_reusability_metric_score
  - weighted_task_score
  - ttfs_delta_vs_raw
  - rescue_delta_vs_raw
  - reprompt_delta_vs_raw
  - rework_minutes_delta_vs_raw
  - weekly_reuse_delta_vs_raw
  - gate_flag
