version: "0.1.0"
catalog_id: "pairslash-phase-3.5-benchmark-task-catalog"
updated_at: "2026-03-24"

schema:
  required_fields:
    - task_id
    - priority
    - user_types
    - wedge
    - scenario
    - trigger
    - input_state
    - success_condition
    - failure_modes
    - why_it_matters
    - thesis_mapping
  enums:
    priority:
      - must_win
      - should_win
      - supporting
    wedge:
      - onboard_repo
      - review_fix_loop
      - memory_candidate_write_global
      - ops_install_doctor
      - continuity_resume
    thesis_mapping:
      - repo_understanding
      - repeatable_safe_workflow
      - disciplined_project_memory
    user_types:
      - p1_power_user_terminal
      - p1_tech_lead_maintainer_staff
      - p2_platform_devex_internal_tooling
      - p3_oss_maintainer_consultant

tasks:
  - task_id: BM-ONB-01
    priority: must_win
    user_types:
      - p1_power_user_terminal
      - p1_tech_lead_maintainer_staff
    wedge: onboard_repo
    scenario: Cold-start onboarding on an unfamiliar active repo.
    trigger: First session after assignment or context switch.
    input_state:
      - repo_has_authoritative_project_memory
      - user_context_is_cold
      - runtime_is_supported
    success_condition:
      - first_plan_is_grounded_in_authoritative_memory
      - no_durable_memory_write_in_onboarding_flow
      - next_action_is_clear_and_actionable
    failure_modes:
      - ignores_authoritative_memory
      - hallucinates_repo_truth
      - hidden_or_implied_write_behavior
      - generic_non_actionable_output
    why_it_matters: Recurring cold-start cost and first trust checkpoint for reuse.
    thesis_mapping:
      primary: repo_understanding
      secondary: repeatable_safe_workflow

  - task_id: BM-RFL-01
    priority: must_win
    user_types:
      - p1_power_user_terminal
      - p1_tech_lead_maintainer_staff
    wedge: review_fix_loop
    scenario: Review/fix loop on failing tests after a code change.
    trigger: CI or local test failure.
    input_state:
      - failing_test_is_reproducible
      - logs_and_diff_available
      - runtime_is_supported
    success_condition:
      - failing_tests_move_to_pass
      - manual_rescue_count_is_zero
      - fix_path_is_reusable
    failure_modes:
      - repeated_dead_end_reprompts
      - manual_rescue_on_core_path
      - regression_after_fix
      - non_reusable_output
    why_it_matters: High-frequency maintainer workflow with direct rework cost.
    thesis_mapping:
      primary: repeatable_safe_workflow
      secondary: repo_understanding

  - task_id: BM-MEM-02
    priority: must_win
    user_types:
      - p1_power_user_terminal
      - p1_tech_lead_maintainer_staff
      - p2_platform_devex_internal_tooling
    wedge: memory_candidate_write_global
    scenario: Promote validated memory candidate into Global Project Memory.
    trigger: New durable decision or constraint must be recorded.
    input_state:
      - candidate_exists_with_source_evidence
      - write_request_is_explicit
      - authoritative_memory_exists
    success_condition:
      - preview_patch_shown_before_write
      - explicit_acceptance_before_mutation
      - audit_trail_fields_complete
      - no_hidden_write_side_effect
    failure_modes:
      - missing_preview
      - missing_explicit_acceptance
      - weak_evidence_promoted
      - audit_metadata_incomplete
    why_it_matters: Core trust wedge for disciplined memory.
    thesis_mapping:
      primary: disciplined_project_memory
      secondary: repeatable_safe_workflow

  - task_id: BM-ONB-02
    priority: should_win
    user_types:
      - p1_power_user_terminal
      - p1_tech_lead_maintainer_staff
      - p3_oss_maintainer_consultant
    wedge: onboard_repo
    scenario: Re-onboard after 7+ day gap with changed repo state.
    trigger: Return-to-repo after context break.
    input_state:
      - repo_has_new_commits
      - prior_session_context_is_stale
    success_condition:
      - changed_context_is_recovered
      - first_action_plan_misses_no_major_constraint
    failure_modes:
      - stale_or_contradictory_summary
      - critical_change_missed
      - user_needs_manual_context_rebuild
    why_it_matters: Directly validates weekly continuity value.
    thesis_mapping:
      primary: repo_understanding
      secondary: disciplined_project_memory

  - task_id: BM-RFL-02
    priority: should_win
    user_types:
      - p1_tech_lead_maintainer_staff
      - p2_platform_devex_internal_tooling
    wedge: review_fix_loop
    scenario: Process PR review comments into a fix-test cycle.
    trigger: Reviewer requests changes.
    input_state:
      - pr_feedback_exists
      - baseline_branch_and_tests_known
    success_condition:
      - review_comments_addressed
      - relevant_tests_pass
      - loop_is_reproducible_with_low_reprompts
    failure_modes:
      - reviewer_intent_missed
      - new_defects_introduced
      - repeated_manual_intervention_needed
    why_it_matters: Common loop where almost-right output creates repeated rework.
    thesis_mapping:
      primary: repeatable_safe_workflow
      secondary: repo_understanding

  - task_id: BM-MEM-03
    priority: should_win
    user_types:
      - p1_tech_lead_maintainer_staff
      - p2_platform_devex_internal_tooling
    wedge: memory_candidate_write_global
    scenario: Reject write request with weak or conflicting evidence.
    trigger: Candidate conflicts with authoritative memory or lacks proof.
    input_state:
      - conflicting_or_duplicate_claim_present
      - intentionally_weak_candidate
    success_condition:
      - write_is_rejected_or_blocked
      - reason_and_next_steps_are_clear
    failure_modes:
      - invalid_write_accepted
      - rejection_reason_unclear
      - bypass_suggested
    why_it_matters: Trust layer must refuse unsafe writes consistently.
    thesis_mapping:
      primary: disciplined_project_memory
      secondary: repeatable_safe_workflow

  - task_id: BM-RFL-03
    priority: supporting
    user_types:
      - p1_power_user_terminal
      - p3_oss_maintainer_consultant
    wedge: review_fix_loop
    scenario: Reproduce and isolate issue from sparse report.
    trigger: New bug report with incomplete repro.
    input_state:
      - sparse_issue_report
      - local_repo_can_run_validation
    success_condition:
      - issue_reproduced_with_documented_steps
      - root_cause_hypothesis_is_evidence_backed
    failure_modes:
      - non_reproducible_after_run
      - high_manual_rescue_to_reproduce
      - speculative_root_cause_only
    why_it_matters: Issue reproducibility rate is an operating KPI.
    thesis_mapping:
      primary: repeatable_safe_workflow
      secondary: repo_understanding

  - task_id: BM-MEM-01
    priority: supporting
    user_types:
      - p1_power_user_terminal
      - p1_tech_lead_maintainer_staff
    wedge: memory_candidate_write_global
    scenario: Extract memory candidates from diff and evidence.
    trigger: Significant change may alter durable project truth.
    input_state:
      - change_evidence_available
      - authoritative_memory_readable
    success_condition:
      - candidates_are_evidence_backed_and_deduplicated
      - weak_claims_marked_non_promotable
    failure_modes:
      - speculative_candidates_dominate
      - duplicates_or_conflicts_missed
      - output_not_reviewable
    why_it_matters: Candidate quality controls memory write quality.
    thesis_mapping:
      primary: disciplined_project_memory
      secondary: repo_understanding

  - task_id: BM-OPS-01
    priority: supporting
    user_types:
      - p2_platform_devex_internal_tooling
      - p3_oss_maintainer_consultant
    wedge: ops_install_doctor
    scenario: Install and doctor recovery on clean or drifted environment.
    trigger: First setup or environment drift.
    input_state:
      - clean_or_drifted_environment
      - selected_supported_runtime
    success_condition:
      - install_succeeds
      - doctor_is_healthy_or_actionable
      - no_third_runtime_suggestion
    failure_modes:
      - install_fails_without_recovery
      - doctor_output_non_actionable
      - runtime_boundary_violation
    why_it_matters: Install/doctor success is required for business execution.
    thesis_mapping:
      primary: repeatable_safe_workflow
      secondary: repo_understanding

  - task_id: BM-CONT-01
    priority: supporting
    user_types:
      - p1_power_user_terminal
      - p1_tech_lead_maintainer_staff
      - p3_oss_maintainer_consultant
    wedge: continuity_resume
    scenario: Resume weekly workflow from durable memory and recent changes.
    trigger: Weekly return to active repo workflow.
    input_state:
      - prior_session_artifacts_exist
      - project_memory_contains_decisions
    success_condition:
      - user_reaches_first_useful_action_faster_than_raw_baseline
      - weekly_reusability_score_is_at_least_two
    failure_modes:
      - stale_context_drives_wrong_first_action
      - no_speed_gain_vs_raw
      - novelty_only_feedback
    why_it_matters: Weekly reuse is the key retention signal in Phase 3.5.
    thesis_mapping:
      primary: disciplined_project_memory
      secondary: repo_understanding
