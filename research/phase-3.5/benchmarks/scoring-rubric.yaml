version: "0.1.0"
rubric_id: "pairslash-phase-3.5-benchmark-rubric"
updated_at: "2026-03-24"

scoring_model:
  core_metrics:
    - time_to_first_success_seconds
    - manual_rescue_count
    - reprompt_count
    - weekly_reusability_score
  core_score_formula: "ttfs_score + rescue_score + reprompt_score + weekly_score"
  priority_multipliers:
    must_win: 1.5
    should_win: 1.2
    supporting: 1.0
  weighted_score_formula: "core_score * priority_multiplier"

metrics:
  - metric_id: time_to_first_success_seconds
    type: duration_seconds
    direction: lower_is_better
    source: machine_log_plus_observer_gate
    required: true
    acceptable_by_priority:
      must_win:
        max: 900
      should_win:
        max: 780
      supporting:
        max: 660
    warning_threshold:
      rule: "value > acceptable_max * 1.2"
    score_bands:
      score_3: "value <= acceptable_max"
      score_2: "value <= acceptable_max * 1.1"
      score_1: "value <= acceptable_max * 1.2"
      score_0: "value > acceptable_max * 1.2"
    why_it_matters: Time-to-first-success is direct time-to-value signal.

  - metric_id: manual_rescue_count
    type: integer
    direction: lower_is_better
    source: observer_log
    required: true
    acceptable_by_priority:
      must_win:
        max: 0
      should_win:
        max: 1
      supporting:
        max: 1
    warning_threshold:
      must_win_rule: "value >= 1"
      other_rule: "value >= 2"
    score_bands:
      must_win:
        score_3: "value == 0"
        score_0: "value >= 1"
      other:
        score_3: "value == 0"
        score_2: "value == 1"
        score_0: "value >= 2"
    why_it_matters: Rescue events expose trust and reliability limits.

  - metric_id: reprompt_count
    type: integer
    direction: lower_is_better
    source: machine_log
    required: true
    acceptable_by_priority:
      must_win:
        max: 3
      should_win:
        max: 4
      supporting:
        max: 4
    warning_threshold:
      rule: "value >= 6"
    score_bands:
      score_3: "value <= acceptable_max"
      score_2: "value == acceptable_max + 1"
      score_1: "value == acceptable_max + 2"
      score_0: "value >= acceptable_max + 3"
    why_it_matters: Re-prompt volume is a proxy for almost-right churn.

  - metric_id: weekly_reusability_score
    type: ordinal_0_3
    direction: higher_is_better
    source: participant_answer_plus_observer_anchor
    required: true
    anchors:
      "0": would_not_reuse
      "1": novelty_only_or_uncertain
      "2": likely_reuse_if_trigger_recurs
      "3": default_path_for_this_job
    acceptable_by_priority:
      must_win:
        min: 2
      should_win:
        min: 2
      supporting:
        min: 1
    warning_threshold:
      rule: "wedge_average < 1.5"
    score_bands:
      score_3: "value == 3"
      score_2: "value == 2"
      score_1: "value == 1"
      score_0: "value == 0"
    why_it_matters: Weekly reuse separates durable value from novelty.

kpi_metrics:
  - metric_id: task_success_without_manual_rescue
    type: boolean_rate
    direction: higher_is_better
    source: derived
    acceptable:
      must_win_rate_min: 0.75
      overall_rate_min: 0.70
    warning_threshold:
      must_win_rate_below: 0.60
      overall_rate_below: 0.55

  - metric_id: rework_reduction_pct_vs_raw
    type: percentage
    direction: higher_is_better
    source: paired_before_after
    acceptable:
      min: 30
    warning_threshold:
      below: 10

  - metric_id: repeated_weekly_use_rate
    type: percentage
    direction: higher_is_better
    source: aggregate_weekly_reusability_score
    acceptable:
      overall_min: 60
      must_win_min: 65
    warning_threshold:
      overall_below: 45

  - metric_id: install_doctor_success_rate
    type: percentage
    direction: higher_is_better
    source: bm_ops_01_aggregate
    acceptable:
      min: 90
    warning_threshold:
      below: 75

  - metric_id: issue_reproducibility_rate
    type: percentage
    direction: higher_is_better
    source: bm_rfl_03_aggregate
    acceptable:
      min: 70
    warning_threshold:
      below: 50

automatic_no_go_conditions:
  - hidden_write_behavior_in_memory_tasks
  - must_win_task_failed_without_rescue_protection
  - runtime_scope_outside_codex_cli_and_github_copilot_cli
  - repeated_weekly_use_rate_below_warning_threshold
  - rework_reduction_pct_vs_raw_below_warning_threshold

go_candidate_conditions:
  - all_must_win_tasks_pass_on_both_runtimes
  - task_success_without_manual_rescue_overall_at_least_0_70
  - rework_reduction_pct_vs_raw_at_least_30
  - repeated_weekly_use_rate_overall_at_least_60
  - no_memory_trust_boundary_violation
